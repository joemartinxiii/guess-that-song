[build]
  publish = "."

[[headers]]
  for = "/clips/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/playlist.json"
  [headers.values]
    Cache-Control = "public, max-age=300"
