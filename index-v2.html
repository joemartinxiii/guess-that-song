<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guess That Song</title>

  <!-- Premium geometric display font (Space Grotesk) — gives the 80s-tech + 2026 premium screen feel -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* ============================================================
       2026 MODERN 4TH OF JULY — v2 DEV PAGE ONLY
       Patriotic spirit (red, navy, white, gold) executed with
       current design language: refined glass, excellent type,
       generous spacing, premium micro-details.
       Original index.html + css/styles.css are 100% untouched.
       ============================================================ */

    /* Premium 2026 near-future typography: Space Grotesk for display (geometric, slightly condensed, expensive), Inter for UI */
    :root {
      --font: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --font-display: "Space Grotesk", "Inter", system-ui, sans-serif;

      /* Patriotic but sophisticated palette */
      --navy-900: #0a1424;
      --navy-800: #111a2e;
      --red: #c41e3a;
      --red-hover: #e11d48;
      --white: #f8fafc;
      --gold: #d4a853;
      --blue: #1e3a8a;
      --text-muted: #94a3b8;
    }

    html { font-family: var(--font); -webkit-font-smoothing: antialiased; }
    body {
      /* The real background is now the WebGL scene; this is just a deep fallback */
      background: #05070f;
    }

    /* WebGL is the living futuristic world behind everything — no accidental overlays */
    #webgl {
      position: fixed;
      inset: 0;
      z-index: 0;
      display: block;
      filter: none !important;   /* ensure nothing is desaturating the rich patriotic blues */
    }

    /* Push the legacy 2D layers above WebGL but below the app UI */
    #starfield, #fireworks {
      z-index: 1;
    }

    /* Elegant animated starfield (patriotic, restrained) */
    .stars { display: none !important; }
    #starfield {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none; opacity: 0.55; mix-blend-mode: screen;
    }

    /* Fireworks canvas — sits above stars, below the app content */
    #fireworks {
      position: fixed; inset: 0; z-index: 1;
      pointer-events: none; mix-blend-mode: screen;
    }

    /* Waving flag — premium, modern, elegant 4th of July accent */
    #flag {
      position: absolute;
      top: -2px;
      left: -38px;
      width: 108px;
      height: 62px;
      z-index: 10;
      opacity: 0.92;
      filter: drop-shadow(0 6px 14px rgba(0,0,0,0.45));
      pointer-events: none;
    }

    .app {
      position: relative; z-index: 1;
      max-width: 980px; margin: 0 auto;
      padding: 2.75rem 2rem 2rem;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 1.65rem;
      position: relative;
      padding-top: 0.4rem;
    }
    /* Big, impactful, premium title — inspired by high-end futuristic interfaces */
    .title {
      font-family: var(--font-display);
      font-size: clamp(2.6rem, 6.8vw, 4.1rem);
      font-weight: 700;
      letter-spacing: -0.055em;
      color: #f8fafc;
      margin: 0 0 0.1rem;
      text-shadow: 0 4px 18px rgba(0,0,0,0.45);
      line-height: 0.92;
    }

    /* Small elegant kicker above the title (like "HERE AND NOW" in premium references) */
    .header-kicker {
      font-family: var(--font-display);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 0.15rem;
      display: block;
    }
    .progress {
      font-size: 0.85rem;
      color: #64748b;
      letter-spacing: 0.04em;
      font-weight: 500;
      margin-top: 0.15rem;
    }

    /* Refined dev badge — patriotic pill */
    /* Elegant minimal info button — replaces the loud demo badge */
    .info-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 26px;
      height: 26px;
      border-radius: 999px;
      border: 1px solid rgba(248,250,252,0.18);
      background: rgba(10,14,26,0.6);
      color: #94a3b8;
      font-family: var(--font-display);
      font-size: 0.78rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 30;
      transition: all 0.15s ease;
    }
    .info-btn:hover {
      background: rgba(196,30,58,0.15);
      border-color: rgba(196,30,58,0.35);
      color: #fda4af;
    }

    .info-panel {
      position: absolute;
      top: 38px;
      right: 4px;
      width: 260px;
      background: rgba(10,14,26,0.92);
      border: 1px solid rgba(248,250,252,0.12);
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 0.82rem;
      color: #cbd5e1;
      box-shadow: 0 20px 50px -10px rgba(0,0,0,0.6);
      z-index: 40;
      line-height: 1.4;
    }
    .info-panel code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      background: rgba(0,0,0,0.3);
      padding: 1px 4px;
      border-radius: 4px;
      font-size: 0.78em;
    }
    .info-panel.hidden {
      display: none;
    }

    /* Ultra-dark premium glass cards — the UI sits inside the cinematic world like the reference */
    .card {
      background: rgba(7, 10, 18, 0.72);
      border: 1px solid rgba(248, 250, 252, 0.09);
      border-radius: 26px;
      padding: 2rem 2.1rem;
      box-shadow: 0 25px 80px -12px rgba(0, 0, 0, 0.8),
                  0 0 0 1px rgba(255,255,255,0.03) inset,
                  0 0 0 1px rgba(196, 30, 58, 0.08);
      backdrop-filter: blur(32px) saturate(1.35) brightness(0.88);
      position: relative;
      z-index: 10;
    }

    /* Make the main app container more transparent so the futuristic background breathes through */
    .app {
      /* the cards do most of the work; we just let the world show in the gaps */
    }
    .play-card { margin-bottom: 0.85rem; }

    .hint-text {
      text-align: center;
      font-size: 1.02rem;
      color: #cbd5e1;
      margin: 0 0 1.35rem;
      font-weight: 500;
      line-height: 1.35;
    }

    /* Hints — modern patriotic buttons */
    .hints {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin-bottom: 1.6rem;
    }

    .btn-hint {
      position: relative;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 0.15rem;
      min-height: 102px;
      padding: 0.85rem 0.6rem;
      background: rgba(248, 250, 252, 0.035);
      color: #f1f5f9;
      border: 1px solid rgba(248, 250, 252, 0.09);
      border-radius: 18px;
      font-weight: 700;
      transition: transform 0.18s cubic-bezier(0.23,1,0.32,1),
                  background 0.18s ease, border-color 0.18s ease;
    }
    .btn-hint:hover:not(:disabled) {
      background: rgba(196, 30, 58, 0.08);
      border-color: rgba(196, 30, 58, 0.28);
      transform: translateY(-1px);
    }
    .btn-hint.played {
      border-color: rgba(212, 168, 83, 0.45);
      background: rgba(212, 168, 83, 0.07);
    }
    .btn-hint.playing {
      background: rgba(196, 30, 58, 0.16);
      border-color: #c41e3a;
      box-shadow: 0 0 0 1px rgba(196, 30, 58, 0.35),
                  0 10px 32px -10px rgba(196, 30, 58, 0.5);
      color: #fff;
    }
    .btn-hint:disabled { opacity: 0.5; }

    .btn-label { font-size: 1.12rem; letter-spacing: -0.01em; }
    .btn-sub {
      font-size: 0.76rem; font-weight: 600;
      color: #94a3b8; letter-spacing: 0.01em;
    }
    .btn-hint.played .btn-sub { color: #d4a853; }
    .btn-hint.playing .btn-sub { color: #fda4af; }

    /* Primary action — rich patriotic red */
    .actions { display: flex; justify-content: center; gap: 0.7rem; }

    .btn-primary {
      min-width: 232px; padding: 0.92rem 2.1rem;
      font-size: 1.03rem; font-weight: 700;
      background: linear-gradient(135deg, #c41e3a, #e11d48);
      color: #fff;
      border: none;
      border-radius: 999px;
      box-shadow: 0 6px 22px -6px rgba(196, 30, 58, 0.55),
                  0 0 0 1px rgba(255,255,255,0.12) inset;
      transition: transform 0.18s cubic-bezier(0.23,1,0.32,1),
                  box-shadow 0.18s ease;
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 14px 34px -8px rgba(196, 30, 58, 0.6);
    }
    .btn-primary:disabled { opacity: 0.45; filter: saturate(0.7); }

    /* Ghost */
    .btn-ghost {
      padding: 0.52rem 1.05rem;
      background: transparent;
      color: #94a3b8;
      border: 1px solid rgba(248,250,252,0.12);
      border-radius: 999px;
      font-weight: 600;
    }
    .btn-ghost:hover { color: #f1f5f9; border-color: rgba(248,250,252,0.28); }

    /* Reveal — warm and celebratory */
    #reveal-card { animation: reveal-in 460ms cubic-bezier(0.23,1,0.32,1) backwards; }
    .reveal-content {
      display: flex; gap: 2.1rem; align-items: flex-start; margin-bottom: 1.65rem;
    }
    .album-art {
      flex-shrink: 0; width: 252px; height: 252px; object-fit: cover;
      border-radius: 18px;
      border: 1px solid rgba(248,250,252,0.1);
      box-shadow: 0 28px 80px -18px rgba(0,0,0,0.65),
                  0 0 0 1px rgba(255,255,255,0.06);
    }
    #reveal-card .album-art {
      animation: art-pop 520ms cubic-bezier(0.23,1,0.32,1) backwards;
    }
    @keyframes reveal-in {
      from { opacity: 0; transform: translateY(14px) scale(0.985); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes art-pop {
      0%   { opacity: 0; transform: scale(0.9) rotate(-2.5deg); }
      55%  { opacity: 1; transform: scale(1.015) rotate(0.4deg); }
      100% { opacity: 1; transform: scale(1) rotate(0); }
    }

    .reveal-details { flex: 1; min-width: 0; padding-top: 0.2rem; }
    .song-title {
      font-size: clamp(1.8rem, 4.1vw, 2.3rem);
      font-weight: 800; line-height: 1.12; margin: 0 0 0.15rem; color: #fff;
      letter-spacing: -0.025em;
    }
    .song-artist {
      font-size: 1.32rem; color: #fda4af; margin: 0 0 0.1rem; font-weight: 700;
    }
    .song-year {
      font-size: 0.98rem; color: #94a3b8; margin: 0 0 1rem;
    }
    .fun-fact {
      font-size: 0.96rem; line-height: 1.48; color: #e2e8f0;
      background: rgba(248,250,252,0.045);
      border: 1px solid rgba(248,250,252,0.08);
      border-radius: 14px; padding: 0.9rem 1.1rem; margin: 0;
    }

    /* === VISUALIZER — subtle, elegant, doesn't fight the big 3D world === */
    .viz-wrap {
      margin: 0.15rem auto 0.95rem;
      width: 100%; max-width: 420px;
      display: flex; justify-content: center;
      padding: 4px 6px;
      background: rgba(6, 9, 18, 0.55);
      border: 1px solid rgba(248,250,252,0.05);
      border-radius: 999px;
      box-shadow: none;
      opacity: 0.85;
    }
    #viz {
      width: 100%; max-width: 470px;
      height: 52px;
      border-radius: 999px;
      background: transparent;
    }

    .footer { margin-top: 2.1rem; text-align: center; }
    .dev-switch {
      margin-left: 0.9rem; font-size: 0.73rem; color: #64748b;
      text-decoration: none; opacity: 0.8;
    }
    .dev-switch:hover { opacity: 1; color: #f1f5f9; }

    /* Modern 2026 toast */
    .toast {
      background: rgba(17, 26, 46, 0.96);
      border: 1px solid rgba(248,250,252,0.1);
      color: #e2e8f0;
      border-radius: 999px;
      padding: 0.7rem 1.25rem;
      box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
      backdrop-filter: blur(14px);
      font-weight: 500;
    }
    .toast.error {
      border-left: 3px solid #c41e3a;
      padding-left: 1.05rem;
    }

    @media (max-width: 720px) {
      .app { padding: 1.9rem 1.2rem 1.4rem; }
      .hints { grid-template-columns: 1fr; }
      .reveal-content { flex-direction: column; align-items: center; text-align: center; }
      .album-art { width: 198px; height: 198px; }
      .dev-badge { top: 2px; right: 8px; font-size: 0.58rem; }
    }
    @media (min-width: 1200px) {
      .app { max-width: 1020px; padding: 3.25rem 2.75rem 2.25rem; }
    }
  </style>
</head>
<body>
  <!-- ============================================================
       FUTURISTIC 80s-TECH / 2026 SCREEN-TECH VISUAL LAYER
       Full-bleed WebGL scene (Three.js) — holographic flag,
       cinematic GPU fireworks, bloom, CRT/glitch post FX.
       This is the "world" the game UI sits inside.
       ============================================================ -->
  <canvas id="webgl" aria-hidden="true"></canvas>

  <!-- Legacy 2D starfield kept for now (can be faded or removed once 3D version is dominant) -->
  <canvas id="starfield" aria-hidden="true" style="opacity:0.32; mix-blend-mode:screen;"></canvas>
  <canvas id="fireworks" aria-hidden="true" style="opacity:0.06; mix-blend-mode:screen;"></canvas>

  <div class="stars" aria-hidden="true"></div>

  <div class="app">
    <header class="header">
      <!-- Header is clean and minimal. The large, clear, vibrant patriotic flag (left) and heroic futuristic eagle (right) are now the dominant 3D background elements. -->

      <!-- Small elegant kicker for premium "near-future interface" feel -->
      <span class="header-kicker">4th of July • 2026</span>

      <h1 class="title">Guess That Song</h1>
      <p class="progress" id="progress" aria-live="polite">Loading…</p>
      <div id="dev-tools" class="dev-tools hidden" aria-label="Song testing controls"></div>

      <!-- Tiny, elegant info icon — replaces the loud "demo tracks" badge -->
      <button id="info-btn" class="info-btn" aria-label="Development info" title="Development build">
        <span>i</span>
      </button>
      <div id="info-panel" class="info-panel hidden" role="dialog" aria-hidden="true">
        <p>Currently running the visual prototype with the three test-tone tracks.<br>
        Drop full MP3s into <code>clips/</code> (e.g. <code>song-01.mp3</code>). Hints play automatically from timestamps in <code>playlist.json</code>.</p>
      </div>
    </header>

    <main class="main">
      <section class="card play-card" id="play-card">
        <p class="hint-text" id="hint-text">Tap a hint to play a snippet. Shout your guess!</p>

        <!-- Live audio-reactive visualizer (only exists on the v2 dev page) -->
        <div class="viz-wrap" id="viz-wrap">
          <canvas id="viz" width="560" height="64" aria-hidden="true"></canvas>
        </div>

        <div class="hints" role="group" aria-label="Song hints">
          <button type="button" class="btn btn-hint" id="hint-0" data-hint="0">
            <span class="btn-label">Hint 1</span>
            <span class="btn-sub" id="hint-0-status">Not played</span>
          </button>
          <button type="button" class="btn btn-hint" id="hint-1" data-hint="1">
            <span class="btn-label">Hint 2</span>
            <span class="btn-sub" id="hint-1-status">Not played</span>
          </button>
          <button type="button" class="btn btn-hint" id="hint-2" data-hint="2">
            <span class="btn-label">Hint 3</span>
            <span class="btn-sub" id="hint-2-status">Not played</span>
          </button>
        </div>

        <div class="actions">
          <button type="button" class="btn btn-primary" id="reveal-btn" disabled>Reveal answer</button>
        </div>
      </section>

      <section class="card reveal-card hidden" id="reveal-card" aria-live="polite">
        <div class="reveal-content">
          <img class="album-art" id="album-art" src="" alt="" width="280" height="280">
          <div class="reveal-details">
            <h2 class="song-title" id="song-title"></h2>
            <p class="song-artist" id="song-artist"></p>
            <p class="song-year" id="song-year"></p>
            <p class="fun-fact" id="fun-fact"></p>
          </div>
        </div>
        <div class="actions">
          <button type="button" class="btn btn-primary" id="next-btn">Next song</button>
        </div>
      </section>
    </main>

    <footer class="footer">
      <button type="button" class="btn btn-ghost" id="new-game-btn">New game</button>
      <a href="/" class="dev-switch">Switch to original</a>
    </footer>
  </div>

  <div class="toast hidden" id="toast" role="status" aria-live="polite"></div>

  <audio id="audio-player" preload="auto"></audio>

  <!-- Loads the v2 logic (game state, persistence, audio controller, etc.) -->
  <script type="module" src="js/game.v2.js"></script>

  <!-- Futuristic visual layer + small dev-page UI behaviors -->
  <script type="module">
    import { initVisuals, triggerHintFireworks, triggerRevealFinale } from './js/visuals.js';

    window.__triggerHintFireworks = triggerHintFireworks;
    window.__triggerRevealFinale = triggerRevealFinale;

    window.addEventListener('load', () => {
      const audio = document.getElementById('audio-player');
      if (audio) initVisuals({ audioElement: audio }).catch(console.warn);

      // Elegant info panel toggle (replaces loud "demo tracks" badge)
      const btn = document.getElementById('info-btn');
      const panel = document.getElementById('info-panel');
      if (btn && panel) {
        btn.addEventListener('click', (e) => {
          e.stopImmediatePropagation();
          const isHidden = panel.classList.toggle('hidden');
          panel.setAttribute('aria-hidden', isHidden);
        });
        // Click outside to close
        document.addEventListener('click', (e) => {
          if (!panel.contains(e.target) && !btn.contains(e.target)) {
            panel.classList.add('hidden');
            panel.setAttribute('aria-hidden', 'true');
          }
        });
      }
    });
  </script>
</body>
</html>
